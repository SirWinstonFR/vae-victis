<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vae Victis — Salle de Guerre</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="app.css">
</head>
<body>

<div id="app">
  <header id="header">
    <div class="logo"><i class="ti ti-sword" aria-hidden="true"></i>Vae Victis</div>
    <div class="header-right">
      <div class="sync-wrap"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Chargement…</span></div>
      <span class="cycle-badge" id="cycle-badge">CYCLE —</span>
      <button class="btn icon-btn" id="btn-refresh" title="Rafraîchir"><i class="ti ti-refresh" aria-hidden="true"></i></button>
      <button class="btn" id="btn-login"><i class="ti ti-user" aria-hidden="true"></i> Connexion</button>
      <button class="btn btn-warn" id="btn-admin" style="display:none"><i class="ti ti-shield" aria-hidden="true"></i> Admin</button>
    </div>
  </header>

  <div id="transbar">
    <span class="trans-label">Transnationales</span>
    <div class="tchip" data-zone="UE"><span>🇪🇺</span><span class="tn">Union Européenne</span></div>
    <div class="tchip" data-zone="OTAN"><span>🛡️</span><span class="tn">OTAN</span></div>
    <div class="tchip" data-zone="ONU"><span>🌐</span><span class="tn">ONU</span></div>
  </div>

  <div id="body-grid">
    <div id="map-wrap">
      <div id="map-loading"><i class="ti ti-world"></i><span>Chargement de la carte…</span></div>
      <svg id="world-svg"></svg>
      <div id="map-tt"></div>
      <div id="zoom-controls">
        <button class="zbtn" id="zoom-in">+</button>
        <button class="zbtn" id="zoom-out">−</button>
        <button class="zbtn" id="zoom-reset"><i class="ti ti-home" aria-hidden="true"></i></button>
      </div>
      <div id="legend">
        <div class="li"><div class="ld" style="background:#2a9a6a"></div>Votre divinité</div>
        <div class="li"><div class="ld" style="background:#4a8ad4"></div>Autre divinité</div>
        <div class="li"><div class="ld" style="background:#2a4a6a"></div>Neutre</div>
        <div class="li"><div class="ld" style="background:#d4a020"></div>Sous attaque</div>
        <div class="li"><div class="ld" style="background:#d44040"></div>Capitulation</div>
      </div>
      <div id="map-hint">Scroll · Glisser pour naviguer</div>
    </div>

    <aside id="panel">
      <div id="panel-inner">
        <div class="prompt"><i class="ti ti-login"></i><span>Chargement des données…</span></div>
      </div>
    </aside>
  </div>

  <div id="dock"></div>
</div>

<!-- Modal login -->
<div class="modal-bg" id="modal-login">
  <div class="modal">
    <h2><i class="ti ti-key" aria-hidden="true"></i>Connexion divine</h2>
    <select id="login-sel"><option value="">— Votre divinité —</option></select>
    <input type="password" id="login-pw" placeholder="Code secret" autocomplete="current-password"/>
    <div id="login-err"></div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-login">Annuler</button>
      <button class="btn btn-info" id="login-submit"><i class="ti ti-login" aria-hidden="true"></i> Entrer</button>
    </div>
  </div>
</div>

<!-- Modal attaque -->
<div class="modal-bg" id="modal-atk">
  <div class="modal">
    <h2 id="atk-title"></h2>
    <div id="atk-body"></div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-atk">Annuler</button>
      <button class="btn btn-danger" id="atk-confirm"><i class="ti ti-sword" aria-hidden="true"></i> Confirmer l'attaque</button>
    </div>
  </div>
</div>

<!-- Modal admin -->
<div class="modal-bg" id="modal-admin">
  <div class="modal">
    <h2><i class="ti ti-shield" aria-hidden="true"></i>Panneau admin</h2>
    <div id="admin-body"></div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-admin">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="app.js"></script>
</body>
</html>
