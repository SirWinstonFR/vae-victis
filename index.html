<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vae Victis — Salle de Guerre</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="vaevictistyle.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="logo">
      <img src="https://imgur.com/3VqtRdh.png" class="logo-img" alt="Vae Victis">
      VAE VICTIS
    </div>
    <div class="logo-sep"></div>

    <div class="sync-wrap">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Chargement…</span>
    </div>
    <span class="cycle-badge" id="cycle-badge">CYCLE —</span>

    <div class="header-right">
      <div class="faction-filters">
        <button class="faction-btn faction-sovereign" data-faction="Sovereign" title="Filtrer Sovereign">
          <span class="faction-dot"></span>Sovereign
        </button>
        <button class="faction-btn faction-olympien" data-faction="Olympiens" title="Filtrer Olympiens">
          <span class="faction-dot"></span>Olympiens
        </button>
        <button class="faction-btn faction-shemning" data-faction="Shemning" title="Filtrer Shemning">
          <span class="faction-dot"></span>Shemning
        </button>
      </div>
      <button class="btn icon-btn" id="btn-hist" title="Historique des cycles"><i class="ti ti-history" aria-hidden="true"></i></button>
      <button class="btn icon-btn" id="btn-fandom" title="Wiki Fandom"><i class="ti ti-book" aria-hidden="true"></i></button>
      <button class="btn icon-btn" id="btn-situation" title="Situations mondiales"><i class="ti ti-alert-triangle" aria-hidden="true"></i></button>
      <button class="btn icon-btn" id="btn-refresh" title="Rafraîchir"><i class="ti ti-refresh" aria-hidden="true"></i></button>
      <button class="btn" id="btn-login"><i class="ti ti-user" aria-hidden="true"></i> Connexion</button>
      <button class="btn btn-warn" id="btn-admin" style="display:none"><i class="ti ti-shield" aria-hidden="true"></i> Admin</button>
    </div>
  </header>

  <!-- TRANSBAR -->
  <div id="transbar">
    <div class="tchip" data-zone="UE">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Flag_of_Europe.svg/60px-Flag_of_Europe.svg.png" class="tchip-flag" alt="UE">
      <div class="tchip-info"><span class="tchip-name">Union Européenne</span><span class="tchip-sub">27 membres</span></div>
    </div>
    <div class="tchip" data-zone="OTAN">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Flag_of_NATO.svg/60px-Flag_of_NATO.svg.png" class="tchip-flag" alt="OTAN">
      <div class="tchip-info"><span class="tchip-name">OTAN</span><span class="tchip-sub">Alliance militaire</span></div>
    </div>
    <div class="tchip" data-zone="ONU">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Emblem_of_the_United_Nations.svg/60px-Emblem_of_the_United_Nations.svg.png" class="tchip-flag" alt="ONU">
      <div class="tchip-info"><span class="tchip-name">ONU</span><span class="tchip-sub">Nations Unies</span></div>
    </div>

    <div class="transbar-sep"></div>

    <div class="faction-dropdown-wrap" id="faction-dropdown-wrap">
      <button class="faction-dropdown-trigger locked" id="faction-dropdown-trigger">
        <span class="faction-dot" id="faction-trigger-dot" style="background:var(--c-text4)"></span>
        <span id="faction-trigger-label">Conseil de Faction</span>
        <i class="ti ti-chevron-down" style="font-size:10px;margin-left:4px"></i>
      </button>
      <div class="faction-dropdown-menu" id="faction-dropdown-menu" style="display:none">
        <button class="faction-dropdown-item faction-org-sovereign locked" id="btn-grande-societe">
          <span class="faction-dot" style="background:var(--c-sovereign)"></span>
          La Grande Société
          <i class="ti ti-lock lock-icon"></i>
        </button>
        <button class="faction-dropdown-item faction-org-olympien locked" id="btn-experreducti">
          <span class="faction-dot" style="background:var(--c-olympien)"></span>
          Experreducti
          <i class="ti ti-lock lock-icon"></i>
        </button>
        <button class="faction-dropdown-item faction-org-shemning locked" id="btn-cercle-asimov">
          <span class="faction-dot" style="background:var(--c-shemning)"></span>
          Cercle d'Asimov
          <i class="ti ti-lock lock-icon"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- TICKER -->
  <div id="warning-ticker">
    <div class="ticker-icon">ALERTE</div>
    <div class="ticker-track"><span class="ticker-content"></span></div>
  </div>

  <!-- BODY -->
  <div id="body-grid">
    <!-- Ranking -->
    <div id="ranking-panel">
      <div class="ranking-header"><i class="ti ti-trophy"></i> Nations</div>
    </div>

    <!-- Globe -->
    <div id="map-wrap">
      <div id="map-loading"><i class="ti ti-globe"></i><span>Initialisation…</span></div>
      <svg id="world-svg"></svg>
      <div id="map-tt"></div>
      <div id="zoom-controls">
        <button class="zbtn" id="zoom-in">+</button>
        <button class="zbtn" id="zoom-out">−</button>
        <button class="zbtn" id="zoom-reset"><i class="ti ti-home" aria-hidden="true"></i></button>
      </div>
      <div id="legend">
        <div class="li"><div class="ld" style="background:#1a8a4a"></div>Votre divinité</div>
        <div class="li"><div class="ld" style="background:#3a7acc"></div>Autre divinité</div>
        <div class="li"><div class="ld" style="background:#3d6480"></div>Neutre</div>
        <div class="li"><div class="ld" style="background:#c87020"></div>Sous attaque</div>
        <div class="li"><div class="ld" style="background:#cc3030"></div>Capitulation</div>
        <div class="li"><div class="ld org-diamond" style="background:#3a7acc"></div>Organisation</div>
      </div>
      <div id="map-hint">Glisser · Scroll pour zoomer</div>
    </div>

    <!-- Panel -->
    <aside id="panel">
      <div id="panel-inner">
        <div class="prompt"><i class="ti ti-login"></i><span>Chargement des données…</span></div>
      </div>
    </aside>
  </div>

  <!-- Situation legend -->
  <div id="situation-legend"></div>

  <!-- Dock -->
  <div id="dock"></div>

</div><!-- #app -->

<!-- Modal login -->
<div class="modal-bg" id="modal-login">
  <div class="modal">
    <h2><i class="ti ti-key" aria-hidden="true"></i>Connexion divine</h2>
    <select id="login-sel"><option value="">— Votre divinité —</option></select>
    <input type="password" id="login-pw" placeholder="Code secret" autocomplete="current-password"/>
    <div id="login-err"></div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-login">Annuler</button>
      <button class="btn btn-primary" id="login-submit"><i class="ti ti-login" aria-hidden="true"></i> Entrer</button>
    </div>
  </div>
</div>

<!-- Modal attaque -->
<div class="modal-bg" id="modal-atk">
  <div class="modal">
    <h2 id="atk-title"></h2>
    <div id="atk-body"></div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-atk">Annuler</button>
      <button class="btn btn-danger" id="atk-confirm"><i class="ti ti-sword" aria-hidden="true"></i> Confirmer l'attaque</button>
    </div>
  </div>
</div>

<!-- Modal admin -->
<div class="modal-bg" id="modal-admin">
  <div class="modal">
    <h2><i class="ti ti-shield" aria-hidden="true"></i>Panneau admin</h2>
    <div id="admin-body"></div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-admin">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="globe.js"></script>
<script src="app.js"></script>
<script src="mapmode-influence.js"></script>
<script src="crisis.js"></script>
<script src="experreducti.js"></script>
<script src="crises_modal.js"></script>
</body>
</html>
